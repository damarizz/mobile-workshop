services:
  - type: web
    name: brain-tumor-backend
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip setuptools && pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --worker-class sync --timeout 60 --bind 0.0.0.0:$PORT --access-logfile - --error-logfile - backend:app
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11"
