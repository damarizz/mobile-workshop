services:
  - type: web
    name: brain-tumor-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 4 --worker-class sync --timeout 60 --bind 0.0.0.0:$PORT backend:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
